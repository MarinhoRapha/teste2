<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0">
	<meta name="author" content="Marinho">
	<meta name="keywords" content="palavras,separadas,por,virgula">
	<meta name="description" content="descricao do site">
	<link rel="stylesheet" type="text/css" href="styles/style.css">

	<title>Formulario</title>

</head>

<body>

	<section class="formulario">

			<div class="container">

				<h2 class="apresentacao">
				Formulario para candidata a cargo de Namorada
				</h2>
				<p class="apresentacao">Preencha o formulario abaixo e boa sorte no processo, Ass: Raphael.</p>
			
				<div class="form-container">

				<form class="form">
					
					<div class="form-wraper">
						<p>Nome</p>
						<input type="text" name="nome">
					</div>

					<div class="form-wraper">
						<p>Idade</p>
						<input type="number" name="nome">
					</div>

					<div class="form-wraper">
						<p>Email</p>
						<input type="Email" name="nome">
					</div>

					<div class="form-wraper">
						<p>Escolha abaixo suas caracteristcas:</p>
						<input type="checkbox" name="nome" id="teste1">
						<label for="teste1">Gostosa</label><br>
						<input type="checkbox" name="nome" id="teste2">
						<label for="teste2">Bunduda</label><br>
						<input type="checkbox" name="nome" id="teste3">
						<label for="teste3">Peituda</label><br>
						<input type="checkbox" name="nome" id="teste4">
						<label for="teste4">Cacheada</label><br>
						<input type="checkbox" name="nome" id="teste5">
						<label for="teste5">Pretinha</label><br>
						<input type="checkbox" name="nome" id="teste6">
						<label for="teste6">Engraçada</label><br>
					</div>

					<div class="form-wraper">
						<p>Telefone</p>
						<input type="Tel" name="nome">
					</div>

					<div class="form-wraper">
						<p>Envie seu curriculo</p>
						<input type="file" name="nome">
					</div>

					<div class="form-w">
						<p>Fale um pouco sobre voce</p>
						<textarea></textarea>
					</div>

					<div class="form-wraper">
						<input type="submit" value="Pronto, Sr Gostoso!"name="Enviar">
					</div>

				</form><!--form-->
			</div><!--form-container-->
			
		</div><!--container-->

	</section><!--formulario-->


</body>

</html>
